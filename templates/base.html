<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#ebe3d6">
  <title>{% block title %}Boda{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Josefin+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  {% block styles %}{% endblock %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/mobile.css') }}">
</head>
<body class="{% block body_class %}{% endblock %}">
  {% block body %}{% endblock %}
  {% block scripts %}{% endblock %}
</body>
</html>
